<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Relatórios</title>
    <style>
        /* Remove todas as bordas e margens da página */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Combina com o tema escuro */
        }
        /* Força o sistema da Lovable a ocupar 100% da tela de forma invisível */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
        }
    </style>
</head>
<body>

    <iframe src="https://relatoriotesteeusanta.lovable.app" title="Sistema de Relatórios"></iframe>

</body>
</html>
